@if(singleStar) {
    <app-icon [size]="24" [icon]="'Star'" [fill]="'var(--yellow)'" />
} @else {
    <div class="flex gap-0.5">
        @for(star of stars; track star.id) {
            <app-icon [size]="24" [icon]="'Star'" [fill]="star.fill" />
        }
    </div>
}
<span class="text-dark-accent">
    {{rating}}
    @if(votes && votes > 0) {
        ({{votes}})
    }
</span>
