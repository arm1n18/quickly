<app-main-layout/>
@if(module) {
  <div class="flex flex-col items-center gap-4 w-[598px]">
    <div class="w-full flex gap-4">
      <app-custom-button
        class="w-1/3"
        className="w-full"
        rounded="md" theme="secondary"
        (click)="changeGameMode('match')"
      >
        Підбір
      </app-custom-button>
      <app-custom-button
        class="w-1/3"
        className="w-full"
        rounded="md" theme="secondary"
        (click)="changeGameMode('test')"
      >
        Тестування
      </app-custom-button>
      <app-custom-button
        class="w-1/3"
        className="w-full" theme="secondary"
        (click)="changeGameMode('default')"
      >
        default
      </app-custom-button>
    </div>

    <app-quiz-cards [cards]="module.cards" [config]="{progressBar: true, dualBtn: true}" />

    <app-cards-overview [cards]="module.cards" class="w-full"/>
  </div>
}
