<app-header (searchChange)="search($event)" [isLocalSearch]="false" />

<main class="flex flex-col gap-4 max-w-300 mx-auto px-3">
    <h1 class="title font-medium">
        Результат пошуку {{ currentSearch() && currentSearch().length > 0 ? ('«' + currentSearch() + '»') : '' }}
    </h1>
    <div class="flex gap-4 md:items-end max-md:flex-col">
        <app-keywords-input
            class="md:max-w-lg"
            [keywords]="filteredKeywords" 
            [selectedKeywords]="selectedKeywords()"
            (keywordsChange)="changeSelectedKeywords($event)"
            (inputChange)="searchKeywords($event)"
        />
        <app-dropdown
            [list]="dropdownListQT()"
            [config]="{
                title: {
                    text: '',
                    label: 'Кількість карток: ',
                },  
                divider: 'line',
                theme: 'secondary',
                fullWidth: true,
                rememberSelection: true,
            }" 
            [position]="{
                px: 'right',
                py: 'bottom'
            }"
        />
    </div>
    <div class="flex gap-4 max-sm:flex-col">
        @for(module of modules(); track module) {
            <div #item class="w-full sm:max-w-1/2 md:max-w-1/3">
                <app-module-item [module]="module" [href]="`/module/${module.id}`" [showAuthor]="true" class="w-full" />
            </div>
        }

    </div>
    
    @if(isLoading()) {
        <div class="loader mx-auto"></div>
    }
</main>
