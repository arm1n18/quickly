@if(task) {
    <div class="flex w-full justify-between gap-4 flex-col" (click)="openFull(modalTemplate)">
        <span class="flex gap-2 items-center">
            <span class="font-medium">{{task.title}}</span>
            <span class="text-sm">#{{task.id}}</span>
        </span>
    </div>

    <ng-template #modalTemplate>
        <div class="flex flex-col gap-8 w-full flex-1" (click)="openFull(modalTemplate)">
            <span class="flex gap-2 items-center max-md:mt-4">
                <span class="font-medium">{{task.title}}</span>
                <span class="text-sm">#{{task.id}}</span>
            </span>

            <div class="flex gap-8 w-full">
                <div class="flex flex-col gap-2">
                    <span class="text-sm">
                        {{task.description}}
                    </span>
                    <span class="text-xs text-(--dark-accent)">
                        {{task.date}}
                    </span>
                </div>
            </div>
        </div>
    </ng-template>
}
