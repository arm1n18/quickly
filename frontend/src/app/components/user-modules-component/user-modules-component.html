@if(modules$ | async; as modules) {
    @if(modules.length !== 0) {
        @for(module of modules; track module) {
            <app-module-item 
                [module]="module"
                [href]="`/module/${module.id}`"
            />
        }
    }
    @else {
        <span>Нічого не знайдено</span>
    }
}
