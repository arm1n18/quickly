<app-icon 
    class="cursor-pointer"
    [icon]="'Edit'" 
    [size]="size()" 
    [fill]="color()" 
    (click)="openModal($event, modalTemplate)"
/>


<ng-template #modalTemplate>
    <form 
        class="modal__body"
        [formGroup]="form" 
    >
        <div class="modal__section">
            <app-text-area 
                [value]="this.form.get('title')?.value || ''" [delay]="0"
                (inputChange)="form.get('title')?.setValue($event)"
            />

            <span
                class="overline" 
                [ngClass]="{ 'text-red-500': (form.get('title')?.get('text')?.value?.length ?? 0) > 50 }"
            >
                ТЕРМІН
                ({{form.get('title')?.value?.length ?? 0}}/50)
            </span>
        </div>

        <div class="modal__section">
            <app-text-area 
                [value]="this.form.get('description')?.value || ''" [delay]="0"
                (inputChange)="form.get('description')?.setValue($event)"
            />
            <span 
                class="overline" 
                [ngClass]="{ 'text-red-500': (form.get('description')?.get('text')?.value?.length ?? 0) > 500 }"
            >
                ОПИС
                ({{form.get('description')?.value?.length ?? 0}}/500)
            </span>
        </div>
        
        <div class="modal__actions">
            <app-button 
                theme="secondary" 
                rounded="md" 
                [disabled]="submitting" 
                (click)="closeModal()"
            >
                Скасувати
            </app-button>
            <app-button 
                theme="primary" 
                rounded="md" 
                [disabled]="!form.valid || submitting" 
                (click)="onSubmit()"
            >
                Зберегти
            </app-button>
        </div>
    </form>
</ng-template>
