<header class="sticky z-1 top-0 w-full">

    <div class="game-header">

        <app-dropdown 
            [list]="dropdownList"
            class="game-header-left"
        />

        <div class="justify-self-center flex flex-col items-center">
            <div>{{ progress.showAnswers ? progress.answeredCorrect : progress.answered }} / {{ progress.maxQuestions }}</div>
            <div>{{ config.title }}</div>
        </div>

        <div class="flex gap-2 game-header-right">
        @if(true) {
            <app-custom-button theme="secondary" rounded="full">
            Друк
            </app-custom-button>
            <app-custom-button theme="hover-only" rounded="full" size="symbol" (click)="config.onModalClick()">
            <app-icon [icon]="'Settings'" [size]="24" [fill]="'#4765FF'" />
            </app-custom-button>
        } @else {
            <app-custom-button theme="secondary" rounded="full">
            Вхід
            </app-custom-button>
            <app-custom-button rounded="full">
            Зареєструватись
            </app-custom-button>
        }
        <app-custom-button theme="hover-only" rounded="full" size="symbol" (click)="changeGameMode('default')">
            <app-icon [icon]="'Cross'" [size]="36" [fill]="'#4765FF'" />
        </app-custom-button>
        </div>
    </div>

    <div class="w-full h-px rounded-3xl bg-(--secondary)">
        <div [ngStyle]="{ 'width': (Math.min(progress.answered / progress.maxQuestions, 1) * 100)+ '%' }" class="h-px rounded-3xl bg-[var(--accent)]"></div>
    </div>
</header>
