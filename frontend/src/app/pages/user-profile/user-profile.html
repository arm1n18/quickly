<app-main-layout/>

<main class="w-full px-3 min-h-dvh">
    <div class="max-w-200 w-full mx-auto py-9 flex flex-col gap-8">
        @if(user$ | async; as userInfo) {
            <div class="flex gap-4 items-center">
                <app-avatar [name]="userInfo.name" [avatarUrl]="userInfo.avatar ?? undefined" />
                <span class="font-medium text-[var(--dark-accent)]">{{userInfo.name}}</span>
            </div>
        }

        <app-segmented-controls [segments]="segments" (selectedSegment)="onSegmentChange($event)"/>

        <div class="flex flex-col gap-4">
            @if(this.selectedSegment == 0) {
                <app-custom-input 
                    [title]="'Пошук модулів'" 
                    [icon]="{show: true, name: 'Search'}"
                    [delay]="500"
                    (inputChange)="search($event)"
                />
            }
            <router-outlet></router-outlet>
        </div>

    </div>
</main>

<app-footer [background]="'#FFF'" />
