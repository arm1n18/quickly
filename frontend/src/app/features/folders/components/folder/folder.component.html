@if(folder) {
    <div class="folder-header">
        <div class="folder-header__main">
            <div class="icon">
                <app-icon [size]="24" [icon]="'Folder'" fill="var(--accent)" />
            </div>

            <div class="folder-header__info">
                <span class="text-medium overline">{{folder.title}}</span>
                <span class="overline">{{`Модулів: ${folder.objects}`}}</span>
            </div>
        </div>

        @if(folder.isOwner) {
            <app-dropdown 
                    [list]="dropdownList"
                    [config]="{
                        rememberSelection: false,
                        divider: 'line',
                    }"
                    [position]="{
                        px: 'right',
                        py: 'bottom'
                    }"
                    class="game-header__left"
                >
                    <app-button btn 
                        theme="hover-only-dark" 
                        [size]="'symbol'"
                        [disabled]="isLoading()"
                    >
                    <app-icon
                        [icon]="'MenuDots'"
                        [size]="24"
                        
                    />
                    </app-button>
            </app-dropdown>
        }
    </div>
}

<ng-template #modalTemplate>
    <form 
        class="modal__body"
        [formGroup]="editForm" 
    >
    
         <div class="modal__section">
            <span 
                class="overline"  
                [ngClass]="{ 'text-red-500': (editForm.get('title')?.get('text')?.value?.length ?? 0) > 50 }"
            >
                Назва
                ({{editForm.get('title')?.value?.length ?? 0}}/50)
            </span>
            
            <app-input 
                [value]="this.editForm.get('title')?.value || ''" [delay]="0"
                (inputChange)="editForm.get('title')?.setValue($event)"
            />
        </div>
        
        <div class="modal__actions">
            <app-button theme="secondary" rounded="md" (click)="closeModal()">
                Скасувати
            </app-button>
            <app-button theme="primary" rounded="md" [disabled]="!editForm.valid" (click)="onSubmit()">
                Оновити
            </app-button>
        </div>

    </form>
</ng-template>
