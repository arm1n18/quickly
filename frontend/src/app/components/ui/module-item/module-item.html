@if(module) {
    <app-icon [size]="24" [icon]="module.type == 'Module' ? 'Notes' : 'Folder'" fill="var(--accent)" />

    <div class="flex gap-2 items-center">
        <div class="flex flex-col">
            <span>{{`${ module.type == 'Module' ? 'Карток' : 'Модулів' }: ${module.objects}`}}</span>
            <span>{{module.title}}</span>
        </div>
        @if(module.hasImage) {
            <!-- <app-icon [size]="16" [icon]="module?.type == 'Module' ? '' : ''" /> -->
        }
    </div>
}
