<div
    class="bg-cover bg-no-repeat bg-center rounded-xl shrink-0 overflow-hidden"
    [style.width]="config.width"
    [style.height]="config.height"
    [style.cursor]="config.allowModal ? 'zoom-in' : 'default'"
    (click)="config.allowModal && openModal()"
  >
  <img [src]="image"
    [ngStyle]="styles"
    class="w-full h-full object-cover" />
</div>
