<div class="flex flex-col gap-8 py-8 px-32 max-lg:px-8 w-full rounded-2xl" [style.background]="background">
    <div class="flex justify-between w-full max-md:flex-col gap-8">
        <div class="flex flex-col gap-4 w-full">
            <img src="favicon.png" height="64" width="64" />
            <span class="text-[var(--dark-accent)] max-w-3/4">
                Quickly сервіс для створення карток, тестів та навчальних модулів, 
                який допомагає краще запам’ятовувати інформацію та перевіряти знання.
            </span>
        </div>

        <div class="flex justify-between w-full max-md:flex-col gap-8">
            <nav class="flex flex-col gap-4 w-1/2">
            <h5>Навчання</h5>
            <ul class="flex flex-col gap-4">
               <li class="text-[var(--dark-accent)] hover:text-[var(--accent)] flex gap-2 items-center">
                    <app-icon [size]="24" [icon]="'Slider'" [fill]="'var(--dark-accent)'" />
                    <a href="/features/cards">
                        Картки
                    </a>
                </li>
                <li class="text-[var(--dark-accent)] hover:text-[var(--accent)] flex gap-2 items-center">
                    <app-icon [size]="24" [icon]="'Document'" [fill]="'var(--dark-accent)'" />
                    <a href="/features/test">
                        Тести
                    </a>
                </li>
                <li class="text-[var(--dark-accent)] hover:text-[var(--accent)] flex gap-2 items-center">
                    <app-icon [size]="24" [icon]="'Notes'" [fill]="'var(--dark-accent)'" />
                    <a href="/">
                        Підбір
                    </a>
                </li>
            </ul>
            </nav>

            <nav class="flex flex-col gap-4 w-1/2">
                <h5>Ідеї та розвиток</h5>
                <ul class="flex flex-col gap-4">
                    <li class="text-[var(--dark-accent)] hover:text-[var(--accent)]">
                        <a href="/">
                            Наші ідеї на майбутнє
                        </a>
                    </li>
                    <li class="text-[var(--dark-accent)] hover:text-[var(--accent)]">
                        <a href="/">
                            Запропонувати ідею
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <nav class="flex flex-col gap-4 w-1/2">
        <h5>Контакти</h5>
        <ul class="flex flex-col gap-4">
            <li class="text-[var(--dark-accent)] hover:text-[var(--accent)] flex gap-2 items-center">
                <app-icon [size]="24" [icon]="'Letter'" [fill]="'var(--dark-accent)'" />
                <a href="/">
                    quickly@quickly.com
                </a>
            </li>
        </ul>
    </nav>
</div>
