<app-header/>

<main class="w-full px-3 min-h-dvh">
    <div class="max-w-200 w-full mx-auto py-9 flex flex-col gap-8">
        @if(user$ | async; as userInfo) {
            <div class="flex gap-4 items-center">
                <app-avatar [name]="userInfo.name" [avatarUrl]="userInfo.avatar ?? undefined" />
                <span class="font-medium text-(--dark-accent)">{{userInfo.name}}</span>
            </div>
        }

        <app-segmented-controls [selected]="selectedSegment()" [segments]="segments" (selectedSegment)="onSegmentChange($event)"/>

        <div>
            <router-outlet></router-outlet>
        </div>
    </div>
</main>

<app-FooterComponent [background]="'#FFF'" />
