<main class="flex flex-col gap-4 w-full h-screen bg-[var(--background)]">
  <div class="game-header">
    <app-dropdown 
      [list]="dropdownList"
      [config]="{title: {text: 'Підбір'}, divider: 'line', icon: {
        name: 'Notes',
        color: 'var(--accent)'
      }}" 
      class="game-header-left"
    />

    <div class="game-header-center">{{ timer().s }},{{ timer().ms }}</div>
    <div class="flex gap-2 game-header-right">
      <!-- <app-custom-button theme="secondary" rounded="md">
        Вхід
      </app-custom-button>
      <app-custom-button rounded="md">
        Зареєструватись
      </app-custom-button> -->
      <app-custom-button theme="hover-only" rounded="md" size="symbol" (click)="changeGameMode('default')">
        <app-icon [icon]="'Cross'" [size]="36" [fill]="'#6d4aff'" />
      </app-custom-button>
    </div>
  </div>
  
  @if(matchedQT() === MatchCards().length/2){
  <div class="game-footer">
    <app-custom-button rounded="md" theme="secondary">
      Зареєструватись, щоб зберегити відповідь
    </app-custom-button>
    <app-custom-button rounded="md" (click)="playAgain()">
      <app-icon [icon]="'Game'" [size]="24" [fill]="'#FFF'" />
      Грати знову
    </app-custom-button>
  </div>
  } @else {
      <div class="cardsMatchWrapper">
      @for (card of MatchCards(); track card) {
        <div
          [ngClass]="{
            'selected': isSelected(card.id),
            'hidden': card.match,
            'matched': matched() && isSelected(card.id),
            'not-matched': matched() != null && !matched() && isSelected(card.id)
           }"
          class="matchCard" (click)="toggleMatchCard(card)"
        >
          <div class="matchCard-text">
            @if(!card.match) {
              {{ card.content.text }}
            }
          </div>

          @if(card.content.media?.type === 'image') {
            <div class="z-1 absolute w-full h-full opacity-20 bg-no-repeat bg-cover" [style.background-image]="'url(' + card.content.media!.content + ')'">
            </div>
          }
        </div>
      }
    </div>
}
</main>
