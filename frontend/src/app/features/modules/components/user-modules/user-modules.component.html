<app-custom-input 
    [title]="'Пошук модулів'" 
    [icon]="{show: true, name: 'Search'}"
    [delay]="500"
    (inputChange)="search($event)"
/>

@if(modules().length == 0) {
    <span>Нічого не знайдено</span>
}
@else {
    @for(module of modules(); track module) {
        <div #item>
            <app-module-item
                [module]="module"
                [href]="`/module/${module.id}`"
            />
        </div>
    }

    @if(isLoading()) {
        <div class="skeletone w-full h-20 rounded-2xl"></div>
        <div class="skeletone w-full h-20 rounded-2xl"></div>
        <div class="skeletone w-full h-20 rounded-2xl"></div>
    }
}
