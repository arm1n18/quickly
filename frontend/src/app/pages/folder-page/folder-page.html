<app-main-layout/>

<div class="max-w-200 w-full mx-auto py-9 flex flex-col gap-8 px-3">
    @if(folder(); as folder) {
        <div class="flex gap-2 items-center">   
            <div class="bg-[var(--secondary)] p-2 rounded-2xl">
                <app-icon [size]="32" [icon]="'Folder'" fill="var(--accent)" />
            </div>
            <h1 class="title">{{folder.title}}</h1>
        </div>

        <div class="flex gap-4 items-center">
            <app-avatar [name]="folder.author.name" />
            <div class="flex flex-col">
                <span class="text-xs m-0 text-[var(--dark-accent)]">Автор</span>
                <a [href]="`/user/${folder.author.name}`" class="font-medium text-[var(--dark-accent)] hover:underline">{{folder.author.name}}</a>
            </div>
        </div>

        @for(module of folder.modules; track module) {
            <app-module-item [module]="{
                title: module.title,
                objects: module.objects,
                hasImage: module.hasImages,
                type: 'Module',
                href: `/module/${module.id}`
            }" />
        }
    }
</div>
