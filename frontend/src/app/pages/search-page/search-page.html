<app-main-layout (searchChange)="search($event)" [isLocalSearch]="false" />

<main class="flex flex-col gap-4 max-w-300 mx-auto px-3">
    <h1 class="title font-medium">
        Результат пошуку {{ searchValue() && searchValue().length > 0 ? ('«' + searchValue() + '»') : '' }}
    </h1>
    <app-segmented-controls [segments]="[{title: 'Модулі'}, {title: 'Папки'}]" />
    <div class="flex gap-4 md:items-end max-md:flex-col">
        <app-keywords-input
            class="md:max-w-lg"
            [keywords]="filteredKeywords" 
            [selectedKeywords]="selectedKeywords()"
            (keywordsChange)="changeSelectedKeywords($event)"
            (inputChange)="searchKeywords($event)"
        />
        <app-dropdown
            [list]="dropdownListQT()"
            [config]="{
                title: {
                    text: '',
                    label: 'Кількість карток: ',
                },  
                divider: 'line',
                theme: 'secondary',
                fullWidth: true,
                rememberSelection: true,
            }" 
            [position]="{
                px: 'right',
                py: 'bottom'
            }"
        />
    </div>
    <div class="flex gap-4 max-sm:flex-col">
        @for(module of modules(); track module) {
            <app-module-item [module]="module" [href]="`/module/${module.id}`" [showAuthor]="true" class="sm:max-w-1/2 md:max-w-1/3" />
        }
    </div>
</main>
