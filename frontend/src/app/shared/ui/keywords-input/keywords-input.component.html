<div class="w-full flex flex-col gap-1 relative">
    <div class="flex w-full justify-between ">
        <span class="text-sm text-dark-accent">Введіть ключові слова</span>
        <span class="text-xs text-(--text-secondary2)">{{selectedKeywords.length}}/10</span>
    </div>
    
    <div
        class="input cursor-text"
        [style.width] = "width"
        [ngStyle]="styles"
        [ngClass]="{
            'focus': focused,
            'px-1': selectedKeywords.length > 0,
            'px-3': selectedKeywords.length == 0
        }"
    >   
        @for(keyword of selectedKeywords; track keyword) {
            <div class="keyword selected">
                <span>{{keyword.name}}</span>
                <div 
                    class="flex p-0.5 rounded-md fill-white hover:bg-(--hover-secondary)
                    hover:fill-(--accent)"
                    (click)="onKeywordRemove(keyword)"
                >
                    <app-icon [icon]="'Cross'" [size]="16"/>
                </div>
            </div>
        }
        <input
            class="flex-1 h-6 pl-1"
            [placeholder]="selectedKeywords.length > 0 ? '' : ' Введіть ключові слова'"
            (input)="onInputChange($event)"
        />
    </div>
    

    @if(focused) {
        <div class="keywordsContaniner drop-shadow-xl shadow-stone-200 ">
            @if(keywords.length > 0) {
                @for(keyword of keywords; track keyword) {
                    <div class="keyword" (click)="onKeywordSelect(keyword)">
                        <app-icon [icon]="'Add'" [size]="16" [stroke]="'var(--dark-accent)'"/>
                        <span>{{keyword.name}}</span>
                    </div>
                }
            }@else {
                <div class="text-md text-dark-accent mx-auto py-3">Не знайдено</div>
            }
        </div>
    }
</div>
