<!-- HEADER -->
<app-main-layout/>
<!-- MAIN CONTENT -->
 
@if(isLoading()) {
  <div class="flex flex-col gap-4 max-w-200 mx-auto px-3">
      <!-- OVERVIEW -->
      <div class="flex w-full justify-between gap-4 max-md:flex-col">
        <div class="skeletone w-44 h-11 rounded-2xl"></div>
        
        <div class="flex gap-3">
          <div class="skeletone w-24 h-11 rounded-2xl"></div>

          <div class="skeletone size-11 rounded-2xl"></div>
          
          <div class="skeletone size-11 rounded-2xl"></div>
        </div>

      </div>

      <!-- KEYWORDS -->
      <div class="flex flex-wrap gap-2">
        <div class="skeletone w-20 h-8 rounded-2xl"></div>
        <div class="skeletone w-40 h-8 rounded-2xl"></div>
        <div class="skeletone w-20 h-8 rounded-2xl"></div>
        <div class="skeletone w-20 h-8 rounded-2xl"></div>
      </div>

      <div class="flex flex-col gap-4 max-md:flex-col-reverse">
        <!-- GAME MODS -->
         <div class="w-full flex gap-4 max-md:flex-wrap">
          <div class="skeletone md:w-1/3 w-[calc(50%-8px)] h-11 rounded-2xl"></div>

          <div class="skeletone md:w-1/3 w-[calc(50%-8px)] h-11 rounded-2xl"></div>

          <div class="skeletone md:w-1/3 w-full h-11 rounded-2xl"></div>
        </div>

        <!-- CARDS-->
        <div class="flex flex-col gap-4">
          <div class="skeletone w-full h-96 rounded-2xl"></div>

          <div class="quiz-footer-nav-md">
            <div class="quiz-footer-left">
                <div class="skeletone size-11 rounded-2xl"></div>
                <div class="skeletone size-11 rounded-2xl"></div>
            </div>

            <div class="quiz-footer-center">
              <div class="skeletone size-11 rounded-2xl"></div>

              <div class="skeletone size-6 rounded-2xl"></div>

              <div class="skeletone size-11 rounded-2xl"></div>
            </div>


              <div class="quiz-footer-right skeletone h-11 w-28 rounded-2xl"></div>
          </div>

          <div class="quiz-footer-nav-sm">
            <div class="flex gap-4 items-center mx-auto">
                <div class="skeletone size-11 rounded-2xl"></div>

                <div class="skeletone size-6 rounded-2xl"></div>

              <div class="skeletone size-11 rounded-2xl"></div>
            </div>

            <div class="w-full flex justify-between">
                <div class="skeletone size-11 rounded-2xl"></div>
              <div class="skeletone size-11 rounded-2xl"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- AUTHOR -->
      <div class="flex gap-4 items-center">
        <div class="skeletone size-11 rounded-2xl"></div>
        <div class="skeletone w-32 h-11 rounded-2xl"></div>
      </div>

      <div class="skeletone w-full h-96 rounded-2xl"></div>
  </div>
}@else {
  @if(module$ | async; as module) {
    <div class="flex flex-col gap-4 max-w-200 mx-auto px-3">
      <!-- OVERVIEW -->
      <div class="flex w-full justify-between max-md:flex-col">
        <div class="flex gap-4 items-center max-md:justify-between">
          <h1 class="title">{{module.title}}</h1>
          <app-rating [rating]="4.1" [votes]="25" />
        </div>
        
        <div class="flex gap-3">
          <app-custom-button
              [theme]="'hover-only-dark'"
              [size]="'text'"
          >
              <app-icon 
                [icon]="'Bookmark'" 
                [size]="24"
              /> 
              Зберегти
          </app-custom-button>

          <app-custom-button
              [theme]="'hover-only-dark'"
              [size]="'symbol'"
              (click)="onCopyUrl()"
          >
              <app-icon [icon]="'Reply'" [size]="24" />
          </app-custom-button>
          
          <app-dropdown 
            [list]="dropdownList()"
            [config]="{
              rememberSelection: false,
              divider: 'line',
            }"
            [position]="{
              px: 'right',
              py: 'bottom'
            }"
            class="game-header-left"
          >
            <app-custom-button btn 
              theme="hover-only-dark" 
              [size]="'symbol'"
            >
              <app-icon
                [icon]="'MenuDots'"
                [size]="24"
              />
            </app-custom-button>
          </app-dropdown>
        </div>
      </div>

      <!-- KEYWORDS -->
      @if(module.keywords) {
        <div class="flex flex-wrap gap-2">
          @for(keyword of module.keywords; track keyword) {
            <a class="keyword-block" [href]="`${keyword.slug}`">{{keyword.name}}</a>
          }
        </div>
      }

      <div class="flex flex-col gap-4 max-md:flex-col-reverse">
        <!-- GAME MODS -->
        <nav class="w-full flex gap-4 max-md:flex-wrap">
          <app-custom-button
            class="md:w-1/3 w-[calc(50%-8px)]"
            className="w-full"
            rounded="md" theme="secondary"
            (click)="changeGameMode('flashcards')"
          >
            <app-icon [size]="24" [icon]="'Slider'" [fill]="'var(--accent)'" />
            Картки
          </app-custom-button>

          <app-custom-button
            class="md:w-1/3 w-[calc(50%-8px)]"
            className="w-full"
            rounded="md" theme="secondary"
            (click)="changeGameMode('match')"
          >
            <app-icon [size]="24" [icon]="'Notes'" [fill]="'var(--accent)'" />
            Підбір
          </app-custom-button>

          <app-custom-button
            class="md:w-1/3 w-full"
            className="w-full"
            rounded="md" theme="secondary"
            (click)="changeGameMode('test')"
          >
            <app-icon [size]="24" [icon]="'Document'" [fill]="'var(--accent)'" />
            Тестування
          </app-custom-button>
        </nav>

        <app-quiz-cards class="w-full" [cards]="module.cards" [config]="{progressBar: true, dualBtn: true, canEdit: module.isOwner}" />
      </div>

      <!-- AUTHOR -->
      <div class="flex w-full justify-between items-center">
        <div class="flex gap-4 items-center">
          <app-avatar [name]="module.author.name" />
          <div class="flex flex-col">
            <span class="text-xs m-0 text-[var(--dark-accent)]">Автор</span>
            <a [href]="`/user/${module.author.name}`" class="font-medium text-[var(--accent)] hover:underline">{{module.author.name}}</a>
          </div>
        </div>

        <!-- <app-custom-button>
          Підписатись
        </app-custom-button> -->
      </div>
      
      <app-cards-overview [module]="module" class="w-full"/>
    </div>
  }
}
